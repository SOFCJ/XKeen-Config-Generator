<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XKeen Config Generator by SOFCJ</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/rTybFsE.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; transition: background 0.3s, color 0.3s; }
        body.dark-theme { background: linear-gradient(135deg, #0f172a, #1e293b); color: #f1f5f9; }
        body.light-theme { background: linear-gradient(135deg, #f8fafc, #e2e8f0); color: #0f172a; }

        .container { max-width: 1000px; width: 100%; padding: 40px; border-radius: 24px; backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); }
        .dark-theme .container { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); }
        .light-theme .container { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.08); }

        .top-controls { display: flex; justify-content: space-between; margin-bottom: 32px; }
        button { border: none; border-radius: 14px; padding: 14px 28px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { transform: translateY(-2px); }
        .btn-generate { background: #0ea5e9; color: white; min-width: 240px; }
        .dark-theme .btn-secondary { background: #2d3a4f; color: white; }
        .light-theme .btn-secondary { background: #e2e8f0; color: #0f172a; }

        .fade-in-up { opacity: 0; animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.2s; } .d3 { animation-delay: 0.3s; } .d4 { animation-delay: 0.4s; } .d5 { animation-delay: 0.5s; }
        
        .header-container { text-align: center; margin-bottom: 32px; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: none; margin-bottom: 24px; background: #222f43; color: white; }
        .light-theme input { background: #e2e8f0; color: #0f172a; }
        pre { padding: 24px; border-radius: 16px; background: #020617; color: #38bdf8; overflow: auto; }
    </style>
</head>
<body class="dark-theme">

<div class="container">   
    <div class="top-controls fade-in-up d1">
        <button id="lang-toggle" class="btn-secondary" onclick="toggleLang()">🌐 Language: RU</button>
        <button id="theme-toggle" class="btn-secondary" onclick="toggleTheme()">🌓 Сменить тему</button>
    </div>

    <div class="header-container fade-in-up d2">
        <h1>🚀 XKeen Config Generator</h1>
        <div class="author-credits">by SOFCJ</div>
    </div>
    
    <div class="form-group fade-in-up d3">
        <label id="lbl-url">Введите ссылку (VLESS / VMESS / Trojan / SS):</label>
        <input type="text" id="url" placeholder="vless://...">
    </div>

    <div class="actions-wrapper fade-in-up d4" style="display:flex; flex-direction:column; align-items:center; gap:16px;">
        <button id="btn-generate" class="btn-generate" onclick="generateConfig()">Сгенерировать конфиг</button>
        <div class="secondary-actions" style="display:flex; gap:16px;">
            <button id="btn-save" class="btn-secondary" onclick="saveConfig()">Сохранить в файл</button>
            <button id="btn-copy" class="btn-secondary" onclick="copyToClipboard(this)">Скопировать JSON</button>
        </div>
    </div>

    <div id="warnings" class="fade-in-up d5" style="margin-top:20px; color:#ef4444;"></div>
    <div class="output-container fade-in-up d5" style="margin-top:20px;">
        <label id="lbl-result">Результат:</label>
        <pre id="output">// Здесь появится готовый JSON...</pre>
    </div>
</div>

<script>
    const i18n = {
        ru: { lang: "🌐 Language: RU", theme: "🌓 Сменить тему", urlLabel: "Введите ссылку (VLESS / VMESS / Trojan / SS):", gen: "Сгенерировать конфиг", save: "Сохранить в файл", copy: "Скопировать JSON", res: "Результат:" },
        en: { lang: "🌐 Language: EN", theme: "🌓 Toggle Theme", urlLabel: "Enter link (VLESS / VMESS / Trojan / SS):", gen: "Generate Config", save: "Save to File", copy: "Copy JSON", res: "Result:" }
    };

    function updateUI() {
        const lang = localStorage.getItem('lang') || 'ru';
        document.getElementById('lang-toggle').innerText = i18n[lang].lang;
        document.getElementById('theme-toggle').innerText = i18n[lang].theme;
        document.getElementById('lbl-url').innerText = i18n[lang].urlLabel;
        document.getElementById('btn-generate').innerText = i18n[lang].gen;
        document.getElementById('btn-save').innerText = i18n[lang].save;
        document.getElementById('btn-copy').innerText = i18n[lang].copy;
        document.getElementById('lbl-result').innerText = i18n[lang].res;
    }

    function toggleLang() {
        const lang = localStorage.getItem('lang') === 'en' ? 'ru' : 'en';
        localStorage.setItem('lang', lang);
        updateUI();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark-theme' : 'light-theme');
    }

    // ВАША ЛОГИКА ГЕНЕРАЦИИ (оставьте вашу функцию generateConfig, saveConfig и т.д. ниже)
    function generateConfig() { alert("Генерация..."); }
    function saveConfig() { alert("Сохранение..."); }
    function copyToClipboard(el) { alert("Копирование..."); }

    document.addEventListener('DOMContentLoaded', () => {
        document.body.className = localStorage.getItem('theme') || 'dark-theme';
        updateUI();
    });
</script>
</body>
</html>
