<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XKeen Config Generator by SOFCJ</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/rTybFsE.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 20px;
            transition: background 0.4s ease, color 0.3s ease;
        }

        body.dark-theme {
            background: radial-gradient(circle at 30% 10%, #0a0f1e, #020617);
            color: #eef2ff;
        }

        body.light-theme {
            background: radial-gradient(circle at 70% 30%, #f5faff, #e2eaf9);
            color: #0a0f1e;
        }

        .container {
            max-width: 860px;
            width: 100%;
            margin: 0 xauto;
            margin: 0 auto;
            padding: 44px 40px 52px;
            border-radius: 48px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
            transition: background 0.3s, border 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: containerFloat 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
        }

        @keyframes containerFloat {
            0% {
                opacity: 0;
                transform: translateY(28px);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .dark-theme .container {
            background: rgba(8, 16, 32, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(56, 189, 248, 0.08) inset;
        }

        .light-theme .container {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 100, 148, 0.12);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
        }

        .header-container {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 38px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #e0f2fe, #7aa2f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .light-theme h1 {
            background: linear-gradient(135deg, #1e3a8a, #0284c7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .author-credits {
            font-size: 15px;
            font-weight: 500;
            opacity: 0.7;
            letter-spacing: 0.4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px;
            width: 100%;
        }

        label {
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            border: none;
            border-radius: 56px;
            padding: 16px 24px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s, transform 0.15s;
            text-align: center;
            background: rgba(0,0,0,0.05);
        }

        .dark-theme input {
            background: #0f172f;
            color: white;
            border: 1px solid #293a5f;
        }

        .light-theme input {
            background: #ffffffdd;
            color: #0f172a;
            border: 1px solid #cbd5e6;
        }

        .dark-theme input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
            transform: scale(1.01);
        }

        .light-theme input:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
            transform: scale(1.01);
        }

        .actions-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-bottom: 36px;
        }

        .btn-generate {
            background: linear-gradient(100deg, #0ea5e9, #3b82f6);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px 42px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            min-width: 260px;
            box-shadow: 0 12px 24px -10px #0ea5e9a0;
            transition: all 0.25s ease;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            background: linear-gradient(100deg, #0284c7, #2563eb);
            box-shadow: 0 20px 28px -12px #0ea5e9c0;
        }

        .btn-generate:active {
            transform: scale(0.97);
        }

        .secondary-actions {
            display: flex;
            justify-content: center;
            gap: 18px;
            width: 100%;
            flex-wrap: wrap;
        }

        button.btn-secondary {
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px);
        }

        .dark-theme button.btn-secondary {
            background: #1e293bcc;
            border: 1px solid #334155;
            color: #e2e8f0;
        }

        .dark-theme button.btn-secondary:hover {
            background: #2d3a55;
            border-color: #5b7bb5;
            transform: translateY(-2px);
        }

        .light-theme button.btn-secondary {
            background: #ffffffcc;
            border: 1px solid #b9c7da;
            color: #1e293b;
        }

        .light-theme button.btn-secondary:hover {
            background: #ffffff;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        #warnings {
            font-weight: 500;
            font-size: 14px;
            border-radius: 60px;
            transition: all 0.2s;
            text-align: center;
            margin-bottom: 20px;
        }

        #warnings:not(:empty) {
            padding: 12px 24px;
            background: rgba(239, 68, 68, 0.12);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ffb4b4;
            border-radius: 60px;
        }

        .output-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .output-container label {
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }

        pre {
            margin: 0;
            padding: 24px;
            border-radius: 28px;
            overflow: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.55;
            max-height: 460px;
            transition: all 0.2s;
            text-align: left;
            cursor: pointer;
        }

        .dark-theme pre {
            background: #030712e6;
            color: #7dd3fc;
            border: 1px solid #2a3b5a;
        }

        .light-theme pre {
            background: #f1f5f9f2;
            color: #0f172a;
            border: 1px solid #cbd5e1;
        }

        @keyframes gentlePulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.6); }
            70% { box-shadow: 0 0 0 14px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }

        .generate-pulse {
            animation: gentlePulse 0.6s ease-out;
        }

        .theme-lang-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 32px;
            margin-bottom: 0px;
            flex-wrap: wrap;
        }

        .theme-lang-bar button {
            background: rgba(128, 128, 128, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
        }

        @media (max-width: 680px) {
            .container {
                padding: 32px 24px;
            }
            h1 {
                font-size: 30px;
            }
            .btn-generate {
                min-width: 220px;
                padding: 12px 28px;
            }
            .secondary-actions {
                flex-direction: column;
                gap: 12px;
            }
            button.btn-secondary, .btn-generate {
                width: 100%;
            }
        }

        .header-container, .form-group, .actions-wrapper, .output-container, .theme-lang-bar {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        }

        .header-container { animation-delay: 0.02s; }
        .form-group { animation-delay: 0.08s; }
        .actions-wrapper { animation-delay: 0.14s; }
        .output-container { animation-delay: 0.22s; }
        .theme-lang-bar { animation-delay: 0.30s; }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="dark-theme">

<div class="container">
    <div class="header-container">
        <h1>XKeen Config Generator</h1>
        <div class="author-credits">by SOFCJ</div>
    </div>

    <div class="form-group">
        <label id="lbl-url" for="url">🔗 Введите ссылку (VLESS / VMESS / Trojan / SS / Hysteria2):</label>
        <input type="text" id="url" placeholder="vless://... или hy2://...">
    </div>

    <div class="actions-wrapper">
        <button id="btn-generate" class="btn-generate" onclick="generateConfigWithFeedback()">✨ Сгенерировать конфиг</button>
        
        <div class="secondary-actions">
            <button id="btn-save" class="btn-secondary" onclick="saveConfig()">💾 Сохранить в файл</button>
            <button id="btn-copy" class="btn-secondary" onclick="copyToClipboard(this)">📋 Скопировать JSON</button>
        </div>
    </div>

    <div id="warnings"></div>

    <div class="output-container">
        <label id="lbl-result">📄 Результат:</label>
        <pre id="output">// Здесь появится готовый JSON...</pre>
    </div>

    <div class="theme-lang-bar">
        <button id="lang-toggle" class="btn-secondary" onclick="toggleLang()">🌐 Language: RU</button>
        <button id="theme-toggle" class="btn-secondary" onclick="toggleTheme()">🌓 Сменить тему</button>
    </div>
</div>

<script>
    let config = {};
    let currentLang = 'ru';

    const i18n = {
        ru: {
            themeBtn: "🌓 Сменить тему",
            langBtn: "🌐 Language: RU",
            urlLabel: "🔗 Введите ссылку (VLESS / VMESS / Trojan / SS / HY2):",
            urlPlaceholder: "vless://... или hy2://...",
            genBtn: "✨ Сгенерировать конфиг",
            saveBtn: "💾 Сохранить в файл",
            copyBtn: "📋 Скопировать JSON",
            resultLabel: "📄 Результат:",
            emptyOutput: "// Здесь появится готовый JSON...",
            errVmess: "⚠️ Ошибка разбора vmess ссылки.",
            errPort: "💡 Рекомендуется использовать порт 443 для лучшей маскировки.",
            errProtocol: "⚠️ Протокол не поддерживается.",
            errFormat: "⚠️ Неверный формат ссылки.",
            alertGenerate: "⚡ Сначала сгенерируйте конфигурацию!",
            copied: "✅ Скопировано в буфер!"
        },
        en: {
            themeBtn: "🌓 Toggle Theme",
            langBtn: "🌐 Language: EN",
            urlLabel: "🔗 Enter link (VLESS / VMESS / Trojan / SS / HY2):",
            urlPlaceholder: "vless://... or hy2://...",
            genBtn: "✨ Generate Config",
            saveBtn: "💾 Save to File",
            copyBtn: "📋 Copy JSON",
            resultLabel: "📄 Result:",
            emptyOutput: "// Ready JSON will appear here...",
            errVmess: "⚠️ Error parsing VMess link.",
            errPort: "💡 Using port 443 is highly recommended for better masquerading.",
            errProtocol: "⚠️ Protocol not supported.",
            errFormat: "⚠️ Invalid link format.",
            alertGenerate: "⚡ Please generate a configuration first!",
            copied: "✅ Copied to clipboard!"
        }
    };

    function updateInterfaceLanguage() {
        document.getElementById('lang-toggle').innerHTML = i18n[currentLang].langBtn;
        document.getElementById('theme-toggle').innerHTML = i18n[currentLang].themeBtn;
        document.getElementById('lbl-url').innerHTML = i18n[currentLang].urlLabel;
        document.getElementById('url').placeholder = i18n[currentLang].urlPlaceholder;
        const genBtn = document.getElementById('btn-generate');
        if(genBtn) genBtn.innerHTML = i18n[currentLang].genBtn;
        document.getElementById('btn-save').innerHTML = i18n[currentLang].saveBtn;
        document.getElementById('btn-copy').innerHTML = i18n[currentLang].copyBtn;
        document.getElementById('lbl-result').innerHTML = i18n[currentLang].resultLabel;
        
        const outputEl = document.getElementById('output');
        if (outputEl && (outputEl.textContent.includes("Здесь появится") || outputEl.textContent.includes("Ready JSON will appear"))) {
            outputEl.textContent = i18n[currentLang].emptyOutput;
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        localStorage.setItem('lang', currentLang);
        updateInterfaceLanguage();
        const urlInput = document.getElementById('url').value.trim();
        if (urlInput !== "") {
            generateConfigCore(true);
        }
    }

    function generateConfigCore(silentWarning = false) {
        let rawUrl = document.getElementById('url').value.trim();
        let warningsDiv = document.getElementById('warnings');
        let outputPre = document.getElementById('output');

        if (rawUrl.startsWith("vmess://")) {
            const base64Payload = rawUrl.substring(8);
            try {
                const decodedPayload = atob(base64Payload);
                const vmessConfig = JSON.parse(decodedPayload);
                config = {
                    "outbounds": [
                        {
                            "tag": "vless-reality",
                            "protocol": "vmess",
                            "settings": {
                                "vnext": [
                                    {
                                        "address": vmessConfig.add,
                                        "port": vmessConfig.port,
                                        "users": [
                                            {
                                                "id": vmessConfig.id,
                                                "alterId": vmessConfig.aid || 0,
                                                "security": vmessConfig.scy || "auto",
                                                "level": 0
                                            }
                                        ]
                                    }
                                ]
                            },
                            "streamSettings": {
                                "network": vmessConfig.net,
                                "security": vmessConfig.tls === "tls" ? "tls" : "none",
                                "tlsSettings": vmessConfig.tls === "tls" ? {
                                    "allowInsecure": true,
                                    "serverName": vmessConfig.sni || "",
                                    "fingerprint": vmessConfig.fp || ""
                                } : undefined,
                                "wsSettings": vmessConfig.net === "ws" ? {
                                    "path": vmessConfig.path || "",
                                    "headers": {
                                        "Host": vmessConfig.host || ""
                                    }
                                } : undefined,
                                "httpSettings": vmessConfig.net === "h2" ? {
                                    "host": vmessConfig.host ? vmessConfig.host.split(',') : [],
                                    "path": vmessConfig.path || ""
                                } : undefined,
                                "kcpSettings": vmessConfig.net === "kcp" ? {
                                    "mtu": 1350,
                                    "tti": 50,
                                    "uplinkCapacity": 12,
                                    "downlinkCapacity": 100,
                                    "congestion": false,
                                    "readBufferSize": 2,
                                    "writeBufferSize": 2,
                                    "header": { "type": vmessConfig.type || "none" }
                                } : undefined
                            }
                        },
                        { "tag": "direct", "protocol": "freedom" },
                        { "tag": "block", "protocol": "blackhole", "settings": { "response": { "type": "http" } } }
                    ]
                };
                warningsDiv.innerHTML = "";
                outputPre.textContent = JSON.stringify(config, null, 4);
            } catch (e) {
                warningsDiv.innerHTML = i18n[currentLang].errVmess;
                outputPre.textContent = "";
                config = {};
            }
            return config;
        }

        // Вырезаем хэш-тег из конца строки, чтобы он не ломал регулярные выражения параметров
        let hashTag = "";
        const hashIndex = rawUrl.indexOf('#');
        if (hashIndex !== -1) {
            hashTag = decodeURIComponent(rawUrl.substring(hashIndex + 1));
            rawUrl = rawUrl.substring(0, hashIndex);
        }

        const regex = /([a-z0-9]+):\/\/([^@]+)@([^:\/?]+):(\d+)/i;
        const match = rawUrl.match(regex);

        if (match) {
            const protocol = match[1].toLowerCase();
            const userInfo = match[2];
            const address = match[3];
            const port = parseInt(match[4], 10);
            
            // Парсим параметры query-строки безопасным путем
            let params = new URLSearchParams();
            const queryIndex = rawUrl.indexOf('?');
            if (queryIndex !== -1) {
                params = new URLSearchParams(rawUrl.substring(queryIndex));
            }

            let warnings = [];
            if (port !== 443 && protocol !== "ss") {
                warnings.push(i18n[currentLang].errPort);
            }
            warningsDiv.innerHTML = warnings.join("<br>");

            if (protocol === "vless" || protocol === "trojan") {
                config = {
                    "outbounds": [
                        {
                            "tag": hashTag || "vless-reality",
                            "protocol": protocol,
                            "settings": {
                                "vnext": protocol === "vless" ? [{
                                    "address": address,
                                    "port": port,
                                    "users": [{ "id": userInfo, "flow": params.get("flow") || "", "encryption": "none", "level": 0 }]
                                }] : undefined,
                                "servers": protocol === "trojan" ? [{
                                    "address": address,
                                    "port": port,
                                    "password": userInfo,
                                    "flow": params.get("flow") || "",
                                    "method": "chacha20-poly1305",
                                    "ota": false,
                                    "level": 0
                                }] : undefined
                            },
                            "streamSettings": {
                                "network": params.get("type") || "tcp",
                                "security": params.get("security") || (protocol === "trojan" ? "tls" : ""),
                                "tlsSettings": (params.get("security") === "tls" || protocol === "trojan") ? {
                                    "alpn": params.get("alpn") ? params.get("alpn").split(',') : [],
                                    "fingerprint": params.get("fp") || "",
                                    "serverName": params.get("sni") || "",
                                    "allowInsecure": true
                                } : undefined,
                                "realitySettings": params.get("security") === "reality" ? {
                                    "publicKey": params.get("pbk") || "",
                                    "fingerprint": params.get("fp") || "",
                                    "serverName": params.get("sni") || "",
                                    "shortId": params.get("sid") || "",
                                    "spiderX": params.get("spx") || "/"
                                } : undefined,
                                "grpcSettings": params.get("type") === "grpc" ? {
                                    "serviceName": params.get("serviceName") || "",
                                    "multiMode": params.get("mode") === "multi"
                                } : undefined,
                                "wsSettings": params.get("type") === "ws" ? {
                                    "path": params.get("path") || "",
                                    "headers": { "Host": params.get("host") || "" }
                                } : undefined
                            }
                        },
                        { "tag": "direct", "protocol": "freedom" },
                        { "tag": "block", "protocol": "blackhole", "settings": { "response": { "type": "http" } } }
                    ]
                };
                outputPre.textContent = JSON.stringify(config, null, 4);
            } else if (protocol === "hy2" || protocol === "hysteria2") {
                const obfsType = params.get("obfs") || "";
                config = {
                    "outbounds": [
                        {
                            "tag": hashTag || "hysteria2-outbound",
                            "protocol": "hysteria2",
                            "settings": {
                                "password": decodeURIComponent(userInfo)
                            },
                            "streamSettings": {
                                "network": "udp",
                                "security": "tls",
                                "tlsSettings": {
                                    "serverName": params.get("sni") || address,
                                    "allowInsecure": params.get("insecure") === "1" || params.get("allowInsecure") === "true"
                                },
                                ...(obfsType && {
                                    "transportSettings": {
                                        "type": obfsType,
                                        "password": params.get("obfs-password") || params.get("obfsParam") || ""
                                    }
                                })
                            },
                            "server": address,
                            "port": port
                        },
                        { "tag": "direct", "protocol": "freedom" },
                        { "tag": "block", "protocol": "blackhole", "settings": { "response": { "type": "http" } } }
                    ]
                };
                outputPre.textContent = JSON.stringify(config, null, 4);
            } else if (protocol === "ss") {
                const parsedParams = new URLSearchParams(rawUrl.split('?')[1] || "");
                const method = parsedParams.get("method") || "aes-256-gcm";
                const password = parsedParams.get("password") || "";
                config = {
                    "outbounds": [
                        {
                            "tag": hashTag || "ss",
                            "protocol": "shadowsocks",
                            "settings": { "servers": [{ "address": address, "port": port, "method": method, "password": password }] }
                        },
                        { "tag": "direct", "protocol": "freedom" },
                        { "tag": "block", "protocol": "blackhole", "settings": { "response": { "type": "http" } } }
                    ]
                };
                outputPre.textContent = JSON.stringify(config, null, 4);
            } else {
                warningsDiv.innerHTML = i18n[currentLang].errProtocol;
                outputPre.textContent = "";
                config = {};
            }
        } else {
            warningsDiv.innerHTML = i18n[currentLang].errFormat;
            outputPre.textContent = "";
            config = {};
        }
        return config;
    }

    function generateConfigWithFeedback() {
        const genButton = document.getElementById('btn-generate');
        genButton.classList.add('generate-pulse');
        setTimeout(() => genButton.classList.remove('generate-pulse'), 550);
        
        const outputPre = document.getElementById('output');
        outputPre.style.transition = "opacity 0.15s";
        outputPre.style.opacity = "0.6";
        
        setTimeout(() => {
            generateConfigCore(false);
            outputPre.style.opacity = "1";
            if (config && config.outbounds) {
                genButton.style.transform = "scale(0.98)";
                setTimeout(() => { if(genButton) genButton.style.transform = ""; }, 150);
            }
        }, 45);
    }

    function saveConfig() {
        if (!config.outbounds || Object.keys(config).length === 0 || !document.getElementById('output').textContent.includes('"outbounds"')) {
            alert(i18n[currentLang].alertGenerate);
            return;
        }
        const blob = new Blob([JSON.stringify(config, null, 4)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '04_outbounds.json';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function copyToClipboard(button) {
        const outputText = document.getElementById('output').textContent;
        if (!config.outbounds || outputText.startsWith("//") || outputText.trim() === "" || outputText === i18n[currentLang].emptyOutput) {
            alert(i18n[currentLang].alertGenerate);
            return;
        }
        navigator.clipboard.writeText(outputText).then(() => {
            const originalText = button.innerHTML;
            button.innerHTML = i18n[currentLang].copied;
            button.style.opacity = "0.8";
            setTimeout(() => {
                button.innerHTML = originalText;
                button.style.opacity = "1";
            }, 2000);
        }).catch(err => console.error('Clipboard error:', err));
    }

    function toggleTheme() {
        const currentTheme = document.body.classList.contains('dark-theme') ? 'dark-theme' : 'light-theme';
        const newTheme = currentTheme === 'dark-theme' ? 'light-theme' : 'dark-theme';
        document.body.classList.replace(currentTheme, newTheme);
        localStorage.setItem('theme', newTheme);
        const container = document.querySelector('.container');
        container.style.transform = "scale(0.99)";
        setTimeout(() => { if(container) container.style.transform = ""; }, 180);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark-theme';
        document.body.classList.add(savedTheme);
        currentLang = localStorage.getItem('lang') || 'ru';
        updateInterfaceLanguage();
        
        const urlInput = document.getElementById('url');
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateConfigWithFeedback();
            }
        });
    });
</script>
</body>
</html>
